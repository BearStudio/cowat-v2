name: 🏷️ PR Title

on:
  pull_request:
    branches: [dev, main]
    types: [opened, edited]

jobs:
  check-pr-title:
    name: 🏷️ PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|chore|test|docs)(\(.+\))?: .+$"

          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "❌ PR title '$TITLE' does not match the required pattern."
            echo ""
            echo "Expected: (feat|fix|chore|test|docs)(<scope>)?: <description>"
            echo ""
            echo "Examples:"
            echo "  feat: add login page"
            echo "  fix(auth): token expiry"
            echo "  chore: drop legacy api"
            echo "  docs(readme): update install guide"
            exit 1
          fi

          echo "✅ PR title '$TITLE' is valid."
