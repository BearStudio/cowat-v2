name: 🧪 E2E Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  E2E:
    name: Playwright E2E Tests
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001:1001
    env:
      VITE_BASE_URL: http://localhost:3000
      VITE_ENV_NAME: tests
      DATABASE_URL: postgres://cowat:cowat@postgres:5432/cowat
      AUTH_SECRET: fyXjLxjXJowjicI2BAjxOaUsQd1QafdegZDciJE/xM8=
      EMAIL_SERVER: smtp://username:password@localhost:1025
      EMAIL_FROM: Cowat <noreply@example.com>
    services:
      postgres:
        image: postgres:16.1

        env:
          POSTGRES_PASSWORD: cowat
          POSTGRES_USER: cowat
          POSTGRES_DB: cowat

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Configure pnpm store
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install deps
        run: pnpm install --prefer-offline

      - name: Migrate database
        run: pnpm db:push

      - name: Add default data into database
        run: pnpm db:seed

      - name: Run Playwright tests
        run: pnpm e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup workspace
        if: always()
        run: git clean -ffdx
