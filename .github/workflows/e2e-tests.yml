name: 🧪 E2E Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  E2E:
    name: Playwright E2E Tests
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    env:
      VITE_BASE_URL: http://localhost:3000
      VITE_ENV_NAME: tests
      DATABASE_URL: postgres://cowat:cowat@postgres:5432/cowat
      AUTH_SECRET: fyXjLxjXJowjicI2BAjxOaUsQd1QafdegZDciJE/xM8=
      EMAIL_SERVER: smtp://username:password@localhost:1025
      EMAIL_FROM: Cowat <noreply@example.com>
      S3_HOST: minio:9000
      S3_BUCKET_NAME: default
      S3_ACCESS_KEY_ID: cowat-access-key
      S3_SECRET_ACCESS_KEY: cowat-secret-key
      S3_SECURE: false
      S3_FORCE_PATH_STYLE: true
      DOCKER_MINIO_USERNAME: minioadmin
      DOCKER_MINIO_PASSWORD: minioadmin
      VITE_S3_BUCKET_PUBLIC_URL: http://minio:9000/default
    services:
      postgres:
        image: postgres:16.1

        env:
          POSTGRES_PASSWORD: cowat
          POSTGRES_USER: cowat
          POSTGRES_DB: cowat

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ env.cache-name }}-
            ${{ runner.os }}-pnpm-store-
            ${{ runner.os }}-

      - name: Install deps
        run: pnpm install

      - name: Setup MinIO bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

          mc alias set minio http://minio:9000 minioadmin minioadmin

          mc admin user add minio $S3_ACCESS_KEY_ID $S3_SECRET_ACCESS_KEY
          mc admin policy attach minio readwrite --user $S3_ACCESS_KEY_ID

          mc mb --ignore-existing minio/$S3_BUCKET_NAME
          mc anonymous set download minio/$S3_BUCKET_NAME

      - name: Migrate database
        run: pnpm db:push

      - name: Add default data into database
        run: pnpm db:seed

      - name: Run Playwright tests
        run: pnpm e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: ignore
