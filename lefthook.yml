pre-commit:
  commands:
    format:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}'
      run: pnpm oxfmt {staged_files}
      stage_fixed: true
    oxlint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}'
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: pnpm lint
